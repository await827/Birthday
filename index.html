<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #startBtn {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      font-size: 18px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="container">
  <img src="birthday.png" alt="Happy Birthday">
  <button id="startBtn">Start Surprise 💖</button>
</div>

</body>
</html>
