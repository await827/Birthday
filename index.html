<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 👈 FIXED (no cropping) */
      background: black;
    }

    #startBtn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 20px 40px; /* 👈 bigger button */
      font-size: 22px;    /* 👈 bigger text */
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
    }

    #startBtn:hover {
      background: #e6005c;
    }
  </style>
</head>

<body>

<div id="container">
  <img src="birthday.png">
  <button id="startBtn">Start Surprise 💖</button>
</div>

</body>
</html>
