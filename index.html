<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 👈 FIXED (no cropping) */
      background: black;
    }

    #startBtn {
      position: absolute;
      top: 65%;
      left: 50%;
      transform: translateX(-50%);
      padding: 30px 70px; /* 👈 bigger button */
      font-size: 29px;    /* 👈 bigger text */
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 60px;
      cursor: pointer;
    }

    #startBtn:hover {
      background: #e6005c;
    }

#questionBox {
  display: none; /* keep this initially */
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;

  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#questionText {
  margin-bottom: 15px;
}

#answerInput {
  width: 70%;
  padding: 18px;
  border-radius: 30px;
  border: 1px solid #ccc;
  margin-top: 20px;
  font-size: 16px;
}

#questionBox button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
}
  </style>
</head>

<body>

<div id="container">
  <img src="birthday.png">
  <button id="startBtn" onclick="start()">Start 💖</button>

  <!-- 👇 ADD THIS HERE -->
  <div id="questionBox" style="display:none;">
    <h2 id="questionText">Question here</h2>
    <input type="text" id="answerInput" placeholder="Type your answer..." />
    <button onclick="nextQuestion()">Next ➡️</button>
  </div>

</div>
  <script>
let answers = [];
let currentQ = 0;

let questions = [
  "What is your favorite color? 🎨",
  "What is your favorite food? 🍕"
];

function start() {
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("questionBox").style.display = "flex";
  showQuestion();
}

function showQuestion() {
  document.getElementById("questionText").innerText = questions[currentQ];
  document.getElementById("answerInput").value = "";
}

function nextQuestion() {
  let ans = document.getElementById("answerInput").value;
  answers.push(ans);

  currentQ++;

  if (currentQ < questions.length) {
    showQuestion();
  } else {
    document.getElementById("questionBox").innerHTML = "Done 🎉";
    console.log(answers);
  }
}
</script>
</body>
</html>
