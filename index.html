<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }
#options {
  display: none;
  position: absolute;
  top: 60%;
  width: 100%;

  flex-direction: column;
  align-items: center;
  gap: 12px;
}

#options button {
  width: 85%;
  height: 60px;
  font-size: 18px;

  border-radius: 30px;
  border: none;
  background: #ff4d6d;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;

  text-align: center;
}
    #container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 👈 FIXED (no cropping) */
      background: black;
    }

    #startBtn {
      position: absolute;
      top: 65%;
      left: 50%;
      transform: translateX(-50%);
      padding: 30px 70px; /* 👈 bigger button */
      font-size: 29px;    /* 👈 bigger text */
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 60px;
      cursor: pointer;
    }

    #startBtn:hover {
      background: #e6005c;
    }

#questionBox {
  display: none;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

#questionText {
  position: absolute;
  top: 28%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 40px;
}

#answerInput {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translateX(-50%);
  width: 75%;
  padding: 25px;
  border-radius: 45px;

  border: 6px solid #ff4d6d; /* 🔴 red outline */

  font-size: 20px;
  text-align: center;
}

#answerInput:focus {
  outline: none;
  box-shadow: 0 0 10px #ff4d6d;
}
#questionBox button {
  position: absolute;
  top: 65%;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: #ff4d6d;
  color: white;
}
  </style>
</head>

<body>
<div id="popup" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%, -50%);
background:white;
padding:50px;
width:80%;
max-width:400px;
border-radius:30px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.3);
z-index:1000;"
>
  <p id="popupText" style="font-size:28px; font-weight:bold;"></p>

  <button onclick="closePopup()" style="
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff4d6d;
    color:white;
  ">
    OK 💖
  </button>

</div>
<div id="container">
  <img id="mainImage" src="birthday.png">
  <button id="startBtn" onclick="start()">Start 💖</button>

  <!-- 👇 ADD THIS HERE -->
 
<h2 id="questionText" style="display:none;"></h2>
<input id="answerInput" type="text" placeholder="Type your answer..." style="display:none;">

<button id="nextBtn" onclick="nextQuestion()"
style="display:none; position:absolute; top:75%; left:50%; transform:translateX(-50%);
padding:18px 50px; border:none; border-radius:35px; background:#ff4d6d; color:white;">
Next ➡️
</button>

<div id="options">
  <button onclick="chooseAnswer()">Surviving your own decision</button>

  <button onclick="chooseAnswer()">Eating and doing nothing</button>

  <button onclick="chooseAnswer()">Driving licence</button>

  <button onclick="chooseAnswer()">Meeting me</button>

  </div>

</div>
  
  <script>
let answers = [];
let currentQ = 0;

let questions = [
  "What is your favorite color? 🎨",
  "What’s your biggest achievement this year?",
  "Why can’t we see you outside at night?",
   "Rate my husbyyy 💖",
   "So Miss Independent what’s one thing you still need help with but won’t admit?"
];

function start() {
  document.getElementById("mainImage").src = "question.png";
  
  document.getElementById("startBtn").style.display = "none";

  document.getElementById("questionText").style.display = "block";
  document.getElementById("answerInput").style.display = "block";
  document.getElementById("nextBtn").style.display = "block";

  showQuestion();
}

function showQuestion() {

  document.getElementById("questionText").innerText = questions[currentQ];

  // QUESTION 1
  if (currentQ === 0) {

    document.getElementById("answerInput").style.display = "block";
    document.getElementById("nextBtn").style.display = "block";
    document.getElementById("options").style.display = "none";
  }

  // QUESTION 2
  else if (currentQ === 1) {

    document.getElementById("options").style.top = "60%";
    
    document.getElementById("answerInput").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("options").style.display = "flex";

    document.getElementById("options").innerHTML = `
      <button onclick="chooseAnswer()">Surviving your own decision</button>
      <button onclick="chooseAnswer()">Eating and doing nothing</button>
      <button onclick="chooseAnswer()">Driving licence</button>
      <button onclick="chooseAnswer()">Meeting me</button>
    `;
  }

  // QUESTION 3
  else if (currentQ === 2) {

    document.getElementById("options").style.top = "60%";
    document.getElementById("answerInput").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("options").style.display = "flex";

    document.getElementById("options").innerHTML = `
      <button onclick="chooseAnswer()">Studying</button>
      <button onclick="chooseAnswer()">Dark magic</button>
      <button onclick="chooseAnswer()">Sleeping</button>
      <button onclick="chooseAnswer()">You're Batman 🦇</button>
    `;
  }

  // QUESTION 4
  else if (currentQ === 3) {

    document.getElementById("answerInput").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("options").style.display = "flex";
    document.getElementById("options").style.top = "48%";
    document.getElementById("options").innerHTML = `
      <img src="husband.jpg"
      style="width:250px; height:250px; object-fit:cover;
      border-radius:20px; margin-bottom:15px;">

      <button onclick="finishQuestion()">10/10 💯</button>
      <button onclick="finishQuestion()">Sexyy 😌</button>
      <button onclick="finishQuestion()">100/10 🔥</button>
      <button onclick="finishQuestion()">Gorgus 💖</button>
    `;
  }
  // QUESTION 5
else if (currentQ === 4) {
   document.getElementById("options").style.top = "60%";
  document.getElementById("options").style.display = "none";

  document.getElementById("answerInput").style.display = "block";
  document.getElementById("nextBtn").style.display = "block";

  document.getElementById("answerInput").value = "";
}
}  
function chooseAnswer() {

  // QUESTION 2 → SHOW POPUP
  if (currentQ === 1) {

    document.getElementById("popupText").innerText =
      "Meeting me is the right answer 💖😌";
document.getElementById("popup").style.display = "block";
  
  }

  // QUESTION 3 → NO POPUP
  else if (currentQ === 2) {

    currentQ++;

    if (currentQ < questions.length) {
      showQuestion();
    } else {
      

      document.getElementById("options").style.display = "none";

      document.getElementById("answerInput").style.display = "none";

      document.getElementById("nextBtn").style.display = "none";
      document.getElementById("questionText").style.display = "none";
    }
  }
}
function closePopup() {
  document.getElementById("popup").style.display = "none";

  currentQ++;

  if (currentQ < questions.length) {
    showQuestion();
  } else {
    
    document.getElementById("options").style.display = "none";
  }
}
    
function finishQuestion() {

  currentQ++;

  if (currentQ < questions.length) {
    showQuestion();
  } else {

    document.getElementById("options").style.display = "none";
    document.getElementById("questionText").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("answerInput").style.display = "none";
  }
}

function finishQuestion() {

  currentQ++;

  if (currentQ < questions.length) {
    showQuestion();
  } else {

    document.getElementById("options").style.display = "none";
    document.getElementById("questionText").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("answerInput").style.display = "none";
  }
}
function nextQuestion() {
  let ans = document.getElementById("answerInput").value;
  answers.push(ans);

  currentQ++;

  if (currentQ < questions.length) {
    showQuestion();
  } else {
    console.log(answers);
  }

}
</script>
</body>
</html>
