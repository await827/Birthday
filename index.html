<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }
   #options {
  display: none;
  position: absolute;
  top: 60%;
  width: 100%;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

#options button {
  width: 85%;
  height: 60px;
  font-size: 18px;

  border-radius: 30px;
  border: none;
  background: #ff4d6d;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;

  text-align: center;
}
    #container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 👈 FIXED (no cropping) */
      background: black;
    }

    #startBtn {
      position: absolute;
      top: 65%;
      left: 50%;
      transform: translateX(-50%);
      padding: 30px 70px; /* 👈 bigger button */
      font-size: 29px;    /* 👈 bigger text */
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 60px;
      cursor: pointer;
    }

    #startBtn:hover {
      background: #e6005c;
    }

#questionBox {
  display: none;
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

#questionText {
  position: absolute;
  top: 28%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 40px;
}

#answerInput {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translateX(-50%);
  width: 75%;
  padding: 25px;
  border-radius: 45px;

  border: 6px solid #ff4d6d; /* 🔴 red outline */

  font-size: 20px;
  text-align: center;
}

#answerInput:focus {
  outline: none;
  box-shadow: 0 0 10px #ff4d6d;
}
#questionBox button {
  position: absolute;
  top: 65%;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: #ff4d6d;
  color: white;
}
  </style>
</head>

<body>

<div id="container">
  <img id="mainImage" src="birthday.png">
  <button id="startBtn" onclick="start()">Start 💖</button>

  <!-- 👇 ADD THIS HERE -->
 
<h2 id="questionText" style="display:none;"></h2>
<input id="answerInput" type="text" placeholder="Type your answer..." style="display:none;">

<button id="nextBtn" onclick="nextQuestion()"
style="display:none; position:absolute; top:75%; left:50%; transform:translateX(-50%);
padding:18px 50px; border:none; border-radius:35px; background:#ff4d6d; color:white;">
Next ➡️
</button>

<div id="options">
  <button onclick="chooseAnswer()">Surviving your own decision</button>

  <button onclick="chooseAnswer()">Eating and doing nothing</button>

  <button onclick="chooseAnswer()">Driving licence</button>

  <button onclick="chooseAnswer()">Meeting me</button>

  </div>

</div>
  
  <script>
let answers = [];
let currentQ = 0;

let questions = [
  "What is your favorite color? 🎨",
  "What’s your biggest achievement this year?"
];

function start() {
  document.getElementById("mainImage").src = "question.png";
  
  document.getElementById("startBtn").style.display = "none";

  document.getElementById("questionText").style.display = "block";
  document.getElementById("answerInput").style.display = "block";
  document.getElementById("nextBtn").style.display = "block";

  showQuestion();
}

function showQuestion() {
  document.getElementById("questionText").innerText = questions[currentQ];

  if (currentQ === 0) {
    document.getElementById("answerInput").style.display = "block";
    document.getElementById("nextBtn").style.display = "block";
    document.getElementById("options").style.display = "none";
  } 
  else if (currentQ === 1) {
    document.getElementById("answerInput").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("options").style.display = "block";
  }
}
function chooseAnswer() {
  alert("Meeting me is the right answer 💖😌");
}


function nextQuestion() {
  let ans = document.getElementById("answerInput").value;
  answers.push(ans);

  currentQ++;

  if (currentQ < questions.length) {
    showQuestion();
  } else {
    console.log(answers);
  }

}
</script>
</body>
</html>
