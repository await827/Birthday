<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 👈 FIXED (no cropping) */
      background: black;
    }

    #startBtn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 30px 70px; /* 👈 bigger button */
      font-size: 29px;    /* 👈 bigger text */
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 60px;
      cursor: pointer;
    }

    #startBtn:hover {
      background: #e6005c;
    }
  </style>
</head>

<body>

<div id="container">
  <img src="birthday.png">
<button id="startBtn" onclick="start()">Start 💖</button>
</div>
  <script>
function start() {
  askQ1();
}

function askQ1() {
  let answer = prompt("Q1: What is your favorite color? 🎨");

  if (answer) {
    alert("Nice choice 😀");
  }
}
</script>
</body>
</html>
